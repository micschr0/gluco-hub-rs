# cgm-bridge configuration.
#
# Secrets are NEVER embedded here. Where a secret is needed, the field
# carries the *name* of the environment variable that holds it
# (e.g. `bearer_token_env = "CGM_BRIDGE_BEARER_TOKEN"`).
#
# Any value can also be overridden by an environment variable using the
# `CGM_BRIDGE__SECTION__KEY` convention, e.g. `CGM_BRIDGE__HTTP__BIND`.

[http]
# Address the HTTP API listens on.
bind = "0.0.0.0:8080"

[poller]
# How often the LibreLink Up source is polled, in seconds. LLU updates
# every ~60 s; values below 30 are rejected to avoid rate-limiting.
interval_secs = 60
