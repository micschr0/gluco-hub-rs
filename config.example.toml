# gluco-hub configuration.
#
# Secrets are NEVER embedded here. Each secret-bearing field carries a
# *reference* to where the secret lives — typically an env-var name
# (`*_env = "MY_VAR"`). The LLU password additionally supports
# `password_file = "/path/to/file"` for use with Docker/Podman secrets,
# systemd `LoadCredential=`, and Kubernetes secret volumes.
#
# Any value can also be overridden by an environment variable using the
# `GLUCO_HUB__SECTION__KEY` convention, e.g. `GLUCO_HUB__HTTP__BIND`.

[http]
# Address the HTTP API listens on.
bind = "0.0.0.0:8080"
# Optional: when set, /glucose/* requires `Authorization: Bearer <token>`
# where the token equals the value of the named environment variable.
# /healthz and /metrics stay public.
# bearer_token_env = "GLUCO_HUB_BEARER_TOKEN"

[poller]
# How often the LibreLink Up source is polled, in seconds. LLU updates
# every ~60 s; values below 30 are rejected to avoid rate-limiting.
interval_secs = 60

# Optional: real LibreLink Up source. Requires the `source-llu` Cargo
# feature on the binary. Uncomment and fill in to drive the poller from
# a real Libre account. The password itself is NEVER stored here — only
# a *reference* to where it lives.
#
# [source.llu]
# email = "you@example.com"
# # Pick exactly one of the two:
# password_env  = "LLU_PASSWORD"
# # password_file = "/run/secrets/llu_password"  # 0600, owned by service user
# # Region: AE, AP, AU, CA, DE, EU, EU2, FR, JP, US, LA, RU, CN.
# region = "EU"
# # Optional: pick a specific patient when the account has more than
# # one linked. When absent, the first connection is used.
# # patient_id = "00000000-0000-0000-0000-000000000000"
# # LibreLink Up app version sent in the `version` header. Defaults to
# # the binary's pinned value. Override here, OR at runtime via the env
# # var `GLUCO_HUB__SOURCE__LLU__VERSION=4.17.0`, when LibreView starts
# # rejecting the default — no recompile required.
# # version = "4.17.0"
# # IANA timezone of the patient. LLU returns timestamps in the patient's
# # local wall-clock time, NOT UTC; without this hint the bridge cannot
# # convert correctly and readings appear shifted by the local offset.
# # Default `UTC` preserves prior (UTC-only-correct) behaviour.
# # timezone = "Europe/Berlin"

# Optional: Nightscout sink. Requires the `sink-nightscout` Cargo
# feature on the binary. Uncomment and fill in to push every batch of
# readings to a self-hosted Nightscout instance.
#
# [sink.nightscout]
# base_url = "https://nightscout.example.com"
# api_secret_env = "NIGHTSCOUT_API_SECRET"

# Optional: MQTT v5 sink (V2). Requires the `sink-mqtt` Cargo feature
# on the binary. Publishes:
#   * one JSON payload per Reading to `<topic_prefix>/glucose`
#     (schema `v: 1`),
#   * a retained `<topic_prefix>/_health` marker driven by the broker's
#     LWT (`{ "online": false, "v": 1 }`),
#   * a retained `<topic_prefix>/_stats` snapshot refreshed every
#     `stats_interval_secs` (uptime, publishes_total, errors,
#     connects_total).
#
# [sink.mqtt]
# broker_host = "mqtt.example.com"
# broker_port = 8883          # 1883 = plain MQTT, 8883 = MQTT-over-TLS
# client_id   = "gluco-hub-1"
# username    = "cgmbridge"   # optional
# password_env = "MQTT_PASSWORD"
# topic_prefix = "gluco-hub/gluco-hub-1"
# qos = 1                     # 0 | 1 | 2
# keep_alive_secs = 30        # 5..=300
# session_expiry_secs = 0     # 0 = clean-start every connect
# tls = true                  # false only for local plaintext brokers
# include_patient_id = true   # set false to omit the patient field
# stats_interval_secs = 60    # 5..=3600; how often _stats is refreshed
