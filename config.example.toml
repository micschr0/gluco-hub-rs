# gluco-hub configuration.
#
# Secrets are NEVER embedded here. Supply them via environment variables
# using the `GLUCO_HUB__SECTION__KEY` pattern (double-underscore delimiters),
# e.g. `GLUCO_HUB__SOURCE__LLU__PASSWORD=secret`. The LLU password additionally
# supports `password_file = "/path/to/file"` for Docker/Podman secrets,
# systemd `LoadCredential=`, and Kubernetes secret volumes.
#
# Any non-secret value can also be overridden by an environment variable using
# the same `GLUCO_HUB__SECTION__KEY` convention, e.g. `GLUCO_HUB__HTTP__BIND`.

[http]
# Master toggle for the embedded HTTP server (cache API + /healthz +
# /metrics). Defaults to true. Set to false for MQTT-only deployments
# (e.g. the Home Assistant add-on): the poller + sinks still run, but
# no TCP listener is opened. Liveness is then observable via the
# heartbeat file `<state.dir>/.alive` (touched after every poll tick).
# enabled = true
# Address the HTTP API listens on. Ignored when enabled = false.
bind = "0.0.0.0:8080"
# Optional: when set, /glucose/* requires `Authorization: Bearer <token>`
# where the token equals the value of GLUCO_HUB__HTTP__BEARER_TOKEN.
# /healthz and /metrics stay public. Ignored (with a startup warning)
# when enabled = false.
# (set GLUCO_HUB__HTTP__BEARER_TOKEN=<secret> in the environment to enable)

[poller]
# How often the LibreLink Up source is polled, in seconds. LLU updates
# every ~60 s; values below 30 are rejected to avoid rate-limiting.
interval_secs = 60

# Optional: real LibreLink Up source. Requires the `source-llu` Cargo
# feature on the binary. Uncomment and fill in to drive the poller from
# a real Libre account.
#
# [source.llu]
# email = "you@example.com"
# # Pick exactly one of the two for the password:
# password_file = "/run/secrets/llu_password"  # 0600, owned by service user
# # (or set GLUCO_HUB__SOURCE__LLU__PASSWORD=<secret> in the environment)
# # Region: AE, AP, AU, CA, DE, EU, EU2, FR, JP, US, LA, RU, CN.
# region = "EU"
# # Optional: pick a specific patient when the account has more than
# # one linked. When absent, the first connection is used.
# # patient_id = "00000000-0000-0000-0000-000000000000"
# # LibreLink Up app version sent in the `version` header. Defaults to
# # the binary's pinned value. Override here, OR at runtime via the env
# # var `GLUCO_HUB__SOURCE__LLU__VERSION=4.17.0`, when LibreView starts
# # rejecting the default — no recompile required.
# # version = "4.17.0"
# # IANA timezone of the patient. LLU returns timestamps in the patient's
# # local wall-clock time, NOT UTC; without this hint the bridge cannot
# # convert correctly and readings appear shifted by the local offset.
# # Default `UTC` preserves prior (UTC-only-correct) behaviour.
# # timezone = "Europe/Berlin"

# Optional: Nightscout sink. Requires the `sink-nightscout` Cargo
# feature on the binary. Uncomment and fill in to push every batch of
# readings to a self-hosted Nightscout instance.
#
# Two auth modes, selected by `auth` (default "api_secret"):
#
#   auth = "api_secret"  →  legacy `api-secret` header against the v1
#                           entries API. Supply the raw secret via:
#                             GLUCO_HUB__SINK__NIGHTSCOUT__API_SECRET=<secret>
#                           Note: modern Nightscout rejects this header on
#                           the v3 API, so api_secret mode targets v1.
#
#   auth = "token"       →  access token exchanged for a JWT, sent as
#                           `Authorization: Bearer` against the v3 entries
#                           API. Supply the access token via:
#                             GLUCO_HUB__SINK__NIGHTSCOUT__TOKEN=<token>
#                           (e.g. "myuploader-0123456789abcdef")
#
# [sink.nightscout]
# base_url = "https://nightscout.example.com"
# auth = "api_secret"        # "api_secret" (default) | "token"

# Optional: MQTT v5 sink (V2). Requires the `sink-mqtt` Cargo feature
# on the binary. Publishes:
#   * one JSON payload per Reading to `<topic_prefix>/glucose`
#     (schema `v: 1`),
#   * a retained `<topic_prefix>/_health` marker driven by the broker's
#     LWT (`{ "online": false, "v": 1 }`),
#   * a retained `<topic_prefix>/_stats` snapshot refreshed every
#     `stats_interval_secs` (uptime, publishes_total, errors,
#     connects_total).
# If your broker requires a password, set:
#   GLUCO_HUB__SINK__MQTT__PASSWORD=<secret>
#
# [sink.mqtt]
# broker_host = "mqtt.example.com"
# broker_port = 8883          # 1883 = plain MQTT, 8883 = MQTT-over-TLS
# client_id   = "gluco-hub-1"
# username    = "cgmbridge"   # optional
# topic_prefix = "gluco-hub/gluco-hub-1"
# qos = 1                     # 0 | 1 | 2
# keep_alive_secs = 30        # 5..=300
# session_expiry_secs = 0     # 0 = clean-start every connect
# tls = true                  # false only for local plaintext brokers
# include_patient_id = true   # set false to omit the patient field
# stats_interval_secs = 60    # 5..=3600; how often _stats is refreshed
#
# Home Assistant MQTT auto-discovery (opt-in). When `true`, the sink
# publishes a retained config on `<discovery_prefix>/sensor/.../config`
# after each ConnAck so HA picks the glucose sensor up automatically.
# discovery_enabled = false
# discovery_prefix = "homeassistant"     # HA's default; change only if HA is reconfigured
# device_name = "Gluco Hub (kitchen)"    # optional; defaults to `Gluco Hub (<client_id>)`
# discovery_unit = "mgdl"                # "mgdl" (default, US) or "mmol" (EU/UK). Switches only
#                                        # the HA sensor's reported unit + value_template; the
#                                        # wire payload always carries both fields.

# On-disk state — used by the dead-letter queue (one JSONL file per sink
# at `<dir>/dlq/<sink>.jsonl`). In containers, mount a persistent volume
# at this path so DLQ entries survive restarts.
# [state]
# dir = "./state"

# Dead-letter queue. Failed sink pushes are persisted here and retried
# on the next successful push attempt. Survives process restarts.
# [dlq]
# enabled = true        # set false to keep prior V2 behaviour (failures lost on restart)
# max_entries = 10000   # per-sink hard cap; ~35 days at LLU's 5-min raster
