# gluco-hub — Docker Compose example
#
# Copy this file to compose.yml, edit the environment variables, and run:
#   docker compose up -d
#
# The service reads its config from a bind-mounted config.toml. Secrets are
# passed via GLUCO_HUB__* environment variables and never written into TOML.
# See config.example.toml for all available options.
#
# Build the image first:
#   docker build -t gluco-hub:latest \
#     --build-arg GLUCO_HUB_GIT_SHA=$(git rev-parse HEAD) \
#     --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) .

services:
  gluco-hub:
    image: gluco-hub:latest
    # Uncomment to build locally instead of using a pre-built image:
    # build:
    #   context: .
    #   args:
    #     GLUCO_HUB_GIT_SHA: "${GLUCO_HUB_GIT_SHA:-unknown}"
    #     BUILD_DATE: "${BUILD_DATE:-}"
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # expose only on loopback; put a reverse proxy in front
    volumes:
      - ./config.toml:/etc/gluco-hub/config.toml:ro
    command: ["run", "-c", "/etc/gluco-hub/config.toml"]
    environment:
      # ── LibreLink Up password ──────────────────────────────────────────
      GLUCO_HUB__SOURCE__LLU__PASSWORD: "${GLUCO_HUB__SOURCE__LLU__PASSWORD}"

      # ── Nightscout API secret (optional) ──────────────────────────────
      # Uncomment if [sink.nightscout] is enabled in config.toml.
      # GLUCO_HUB__SINK__NIGHTSCOUT__API_SECRET: "${GLUCO_HUB__SINK__NIGHTSCOUT__API_SECRET}"

      # ── MQTT password (optional) ───────────────────────────────────────
      # Uncomment if [sink.mqtt] is enabled and your broker requires auth.
      # GLUCO_HUB__SINK__MQTT__PASSWORD: "${GLUCO_HUB__SINK__MQTT__PASSWORD}"

      # ── HTTP Bearer token (optional) ───────────────────────────────────
      # Uncomment to protect /glucose/* with Bearer authentication.
      # GLUCO_HUB__HTTP__BEARER_TOKEN: "${GLUCO_HUB__HTTP__BEARER_TOKEN}"

      # ── Logging ────────────────────────────────────────────────────────
      RUST_LOG: "gluco_hub=info"
      # GLUCO_HUB_LOG_PRETTY: "1"  # human-readable logs instead of JSON

    # Health monitoring: the runtime image is distroless (no shell, no wget).
    # Use external probes against GET /healthz (port 8080) instead — e.g.
    # Prometheus blackbox_exporter, Uptime Kuma, or a Kubernetes readinessProbe.

    # The distroless runtime image runs as uid 65532 (nonroot).
    security_opt:
      - no-new-privileges:true
    read_only: true

    # Resource limits — adjust to taste. A Raspberry Pi 4 handles the
    # default 60 s poll interval comfortably within these bounds.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
