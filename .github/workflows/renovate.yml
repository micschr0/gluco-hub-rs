name: Renovate

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

# Deny-all by default. Renovate authenticates with its own RENOVATE_TOKEN
# (PAT) — the workflow's GITHUB_TOKEN only needs `contents: read` for
# checkout.
permissions: {}

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          configurationFile: renovate.json
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          GIT_AUTHOR_NAME: micschro
          GIT_AUTHOR_EMAIL: micschro@mailbox.org
          GIT_COMMITTER_NAME: micschro
          GIT_COMMITTER_EMAIL: micschro@mailbox.org
