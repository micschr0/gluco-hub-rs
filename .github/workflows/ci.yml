name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch so stacked feature→feature
  # PRs get fmt/clippy/test/build too — formatting drift on an inner branch
  # of a stack must not stay invisible until it retargets main. The heavy
  # container `integration-tests` job below self-gates to base==main.
  pull_request:

# Cancel superseded runs on the same branch / PR — but never on main,
# so every push to main completes and primes the shared cache.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

# Deny-all by default; each job opts into the narrowest token scope it
# actually needs. A compromised Action in any of these jobs cannot push
# packages, open PRs, or write contents.
permissions: {}

jobs:
  # Fails the PR if a dependency change introduces a known-vulnerable
  # package (severity >= high). PR-only — the diff-based review needs a
  # base/head pair to compare.
  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            index.crates.io:443
            static.crates.io:443
            crates.io:443
            static.rust-lang.org:443
            release-assets.githubusercontent.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt
          # fmt does not need the build cache.
          cache: false

      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          # Base Rust/GitHub endpoints plus the GitHub cache service
          # (rust-cache): *.actions.githubusercontent.com for the cache
          # API, *.blob.core.windows.net for the Azure-backed blob store.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            index.crates.io:443
            static.crates.io:443
            crates.io:443
            static.rust-lang.org:443
            release-assets.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy
          # The action defaults RUSTFLAGS to "-D warnings"; we override
          # to empty here so the explicit `-- -D warnings` flag below
          # controls clippy alone, not every cargo invocation.
          rustflags: ""
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: clippy --all-features
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: clippy --no-default-features
        run: cargo clippy --all-targets --no-default-features --locked -- -D warnings

      # The `integration-tests` feature pulls in the testcontainers
      # surface; lint it explicitly too so changes there don't slip
      # past clippy on main pushes (the dedicated `integration-tests`
      # job below only runs for PRs to main).
      - name: clippy --features integration-tests
        run: cargo clippy --all-targets --features integration-tests --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          # Base Rust/GitHub endpoints plus the GitHub cache service
          # (rust-cache), see the clippy job.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            index.crates.io:443
            static.crates.io:443
            crates.io:443
            static.rust-lang.org:443
            release-assets.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      # Run production features explicitly rather than `--all-features`
      # to avoid pulling in the container-backed `integration-tests`
      # feature, which has its own dedicated job below (PRs to main only).
      # `cargo check --all-features` (below) still verifies that every
      # feature gate compiles, including integration-tests.
      - name: test (production features)
        run: cargo test --locked --features "source-llu sink-nightscout sink-mqtt mock-source"

      - name: test --no-default-features
        run: cargo test --no-default-features --locked

      - name: check --all-features
        run: cargo check --all-features --locked

  build:
    name: build release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            index.crates.io:443
            static.crates.io:443
            crates.io:443
            static.rust-lang.org:443
            release-assets.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-auditable
        run: cargo install cargo-auditable --locked

      - name: cargo auditable build --release
        env:
          GLUCO_HUB_GIT_SHA: ${{ github.sha }}
        run: |
          cargo auditable build --release --locked \
            --features "source-llu sink-nightscout sink-mqtt" \
            --bin gluco-hub

  msrv:
    name: MSRV (1.95)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            index.crates.io:443
            static.crates.io:443
            crates.io:443
            static.rust-lang.org:443
            release-assets.githubusercontent.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: "1.95"
          # MSRV check does not need to warm the shared cache.
          cache: false

      - name: cargo check on MSRV
        # `+1.95` overrides rust-toolchain.toml (which pins stable for
        # local dev) so the MSRV signal stays real.
        run: cargo +1.95 check --all-features --locked

  # Container-backed integration tests (Mosquitto, Nightscout + MongoDB,
  # combined fan-out). Slow — ~5 minutes per test boot of NS — so gated
  # to PRs against `main` only. main pushes get fmt/clippy/test/build
  # but not this lane.
  integration-tests:
    name: integration-tests (container-backed)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          # Don't pollute the main cache scope — integration deps are
          # large and only used by this job.
          cache-key: integration-tests
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: verify Docker is available
        # GH ubuntu-latest images ship Docker but make the version
        # explicit in the log so failures are easy to root-cause.
        run: docker version

      - name: pre-pull container images
        # Pulling in serial up-front avoids parallel test boots racing
        # for the same image layer.
        run: |
          docker pull eclipse-mosquitto:2
          docker pull mongo:6
          docker pull nightscout/cgm-remote-monitor:15.0.3

      - name: cargo test --features integration-tests
        # --test-threads=1 serialises tests because NS startup is heavy
        # and parallel docker-compose stacks on smaller runners stress
        # both memory and Docker's network setup.
        run: cargo test --features integration-tests --locked -- --test-threads=1


  zizmor:
    name: GitHub Actions security scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            ghcr.io:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          min-severity: medium
          min-confidence: medium
